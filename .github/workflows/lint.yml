name: Lint

on:
  push:
    branches: ["master"]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Run lint checks
        run: npm run lint

      - name: Check Markdown formatting
        run: npm run check:md

      - name: Check TypeScript types
        run: npm run check:types
        continue-on-error: true
        # Note: Type errors related to '@mariozechner/pi-coding-agent' are expected
        # as that package is provided by the Pi runtime, not installed locally

      - name: Run tests
        run: npm run test:run
